version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: studyhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: studyhub
      POSTGRES_PASSWORD: studyhub123
      POSTGRES_DB: studyhub
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U studyhub -d studyhub']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: studyhub-backend
    restart: unless-stopped
    ports:
      - '4000:4000'
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://studyhub:studyhub123@postgres:5432/studyhub?schema=public
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
